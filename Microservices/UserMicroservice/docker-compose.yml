version: '3.8'

services:
  auth-mysql:
    image: 'mysql:8.0'
    ports:
      - '3306:3306'
    environment:
      - MYSQL_DATABASE=user_microservice_db
      - MYSQL_ROOT_PASSWORD=root_pass
      - MYSQL_USER=auth_user
      - MYSQL_PASSWORD=auth_pass
    volumes:
      - auth_mysql_data:/var/lib/mysql

volumes:
  auth_mysql_data: