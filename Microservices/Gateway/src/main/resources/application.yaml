server:
  port: 8080

spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: false
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/auth/**, /users/**

        - id: board-service
          uri: ${BOARD_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/board/**, /column/**, /task/**

        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:ws://localhost:8083}
          predicates:
            - Path=/ws-endpoint/**

jwt:
  secret: ${JWT_SECRET:9f3a1c7e2b6d4f809a5c1e7b3d8f2a6c4b0e9d1f7a3c5e8b2d6f1a9c4e7b3d0}