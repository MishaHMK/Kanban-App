server:
  port: 8082

spring:
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/board_service_db}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:MichHMKSql}

flyway:
  enabled: true
  baseline-on-migrate: true

jpa:
  database-platform: org.hibernate.dialect.MySQL8Dialect
  show-sql: true
  hibernate:
    ddl-auto: validate

jwt:
  secret: ${JWT_SECRET:9f3a1c7e2b6d4f809a5c1e7b3d8f2a6c4b0e9d1f7a3c5e8b2d6f1a9c4e7b3d0}

internal:
  secret: ${INTERNAL_SECRET:super_secret_key}

notification:
  service:
    url: ${NOTIFICATION_SERVICE_URL:http://localhost:8083}

board:
  columns-limit: 5
  tasks-limit: 10

resilience4j:
  retry:
    instances:
      notificationService:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - feign.FeignException
          - java.net.ConnectException