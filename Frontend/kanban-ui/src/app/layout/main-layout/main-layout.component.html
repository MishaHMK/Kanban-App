<nz-layout class="app-layout">
  <nz-header class="app-header">
    <div class="header-left">
      <span class="logo">
        <span nz-icon nzType="layout" class="logo-icon"></span>
        Kanban
      </span>
    </div>

    @if (headerActions.searchVisible()) {
      <div class="header-search">
        <nz-input-group [nzPrefix]="searchIcon" class="task-search">
          <input
            nz-input
            placeholder="Search tasks..."
            [ngModel]="headerActions.searchQuery()"
            (ngModelChange)="headerActions.updateQuery($event)"
          />
        </nz-input-group>
        <ng-template #searchIcon>
          <span nz-icon nzType="search"></span>
        </ng-template>

        <button nz-button class="filter-btn" (click)="headerActions.triggerFilter()">
          <span nz-icon nzType="filter"></span>
          <span class="filter-label">Filters</span>
        </button>
      </div>
    }

    <div class="header-right">
      <span class="username">{{ auth.currentUser()?.nickname }}</span>
      <button nz-button nzType="text" (click)="auth.logout()">
        <span nz-icon nzType="logout"></span>
        Logout
      </button>
    </div>
  </nz-header>

  <nz-content class="app-content">
    <router-outlet />
  </nz-content>

  <nz-footer class="app-footer">
    <span>Kanban © {{ currentYear }} — Built with Angular & Spring Boot</span>
  </nz-footer>
</nz-layout>
