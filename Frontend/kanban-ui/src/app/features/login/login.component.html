<div class="auth-page">
  <div class="auth-card">

    <div class="auth-header">
      <div class="auth-logo">
        <span nz-icon nzType="layout" nzTheme="outline"></span>
      </div>
      <h2>Welcome back</h2>
      <p>Sign in to your Kanban workspace</p>
    </div>

    <form nz-form [formGroup]="form" nzLayout="vertical" (ngSubmit)="submit()">

      <nz-form-item>
        <nz-form-label>Email</nz-form-label>
        <nz-form-control nzErrorTip="Please enter a valid email">
          <nz-input-group nzPrefixIcon="mail">
            <input nz-input formControlName="email" placeholder="you@example.com" type="email" />
          </nz-input-group>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label>Password</nz-form-label>
        <nz-form-control nzErrorTip="Password must be at least 8 characters">
          <nz-input-group nzPrefixIcon="lock" [nzSuffix]="suffixTemplate">
            <input nz-input formControlName="password"
              [type]="passwordVisible ? 'text' : 'password'"
              placeholder="••••••••" />
          </nz-input-group>
          <ng-template #suffixTemplate>
            <span nz-icon
              [nzType]="passwordVisible ? 'eye-invisible' : 'eye'"
              (click)="passwordVisible = !passwordVisible"
              style="cursor: pointer">
            </span>
          </ng-template>
        </nz-form-control>
      </nz-form-item>

      <button nz-button nzType="primary" nzBlock [nzLoading]="loading" type="submit">
        Sign in
      </button>

    </form>

    <p class="auth-footer">
      Don't have an account?
      <a routerLink="/register">Register</a>
    </p>

  </div>
</div>
